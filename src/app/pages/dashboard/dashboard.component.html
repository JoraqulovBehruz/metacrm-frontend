<div class="dashboard">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo">M</div>
      <span class="brand">MetaCRM</span>
    </div>
    <div class="header-right">
      <span class="username">{{ user?.fullName }}</span>
      <button class="btn-logout" (click)="logout()">Chiqish</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h2>Bosh sahifa</h2>
    <p class="welcome">Xush kelibsiz, {{ user?.fullName }}!</p>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card" *ngFor="let stat of stats">
        <div class="stat-icon" [style.background]="stat.color + '15'">
          {{ stat.icon }}
        </div>
        <div class="stat-info">
          <span class="stat-value">{{ stat.value }}</span>
          <span class="stat-label">{{ stat.label }}</span>
        </div>
      </div>
    </div>

    <!-- PLACEHOLDER -->
    <div class="placeholder">
      <p>📊 Tez orada bu yerda grafik va jadvallar bo'ladi</p>
    </div>
  </div>

</div>
